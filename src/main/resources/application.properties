```properties
# Configuración del nombre de la aplicación
spring.application.name=ia-autofix-demo

# Configuración de la base de datos H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuración de JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuración de seguridad JWT
jwt.secret-key=your-secret-key
jwt.token-validity=3600000 # 1 hora de validez

# Configuración para permitir solo a usuarios con rol ADMINISTRADOR
spring.security.user.roles=ADMINISTRADOR
```